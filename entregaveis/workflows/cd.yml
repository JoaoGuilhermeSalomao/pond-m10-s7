name: CD Simulated Deploy

on:
  workflow_run:
    workflows: ["CI Metrics Experiment"]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  simulated-deploy:
    name: Simulated deploy artifact
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate deploy summary
        run: |
          mkdir -p artifacts
          {
            echo "Deploy simulado"
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Commit: $GITHUB_SHA"
            echo "Workflow run: $GITHUB_RUN_ID"
            echo "Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > artifacts/deploy-summary.txt

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: simulated-deploy-${{ github.run_id }}
          path: artifacts/deploy-summary.txt

